<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Sözcük Zinciri</title>

    <style>
      /* =====================
   GENEL
===================== */

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;

        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }

      body {
        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 20px;

        color: white;

        background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);

        overflow-x: hidden;
      }

      /* hareketli arka plan */

      body::before {
        content: "";

        position: fixed;

        width: 500px;

        height: 500px;

        background: radial-gradient(circle, #38bdf8, transparent 70%);

        top: -200px;

        left: -200px;

        opacity: 0.25;

        animation: float 8s infinite alternate;
      }

      body::after {
        content: "";

        position: fixed;

        width: 400px;

        height: 400px;

        background: radial-gradient(circle, #a855f7, transparent 70%);

        bottom: -150px;

        right: -150px;

        opacity: 0.25;

        animation: float 10s infinite alternate-reverse;
      }

      @keyframes float {
        from {
          transform: translateY(0);
        }

        to {
          transform: translateY(80px);
        }
      }

      /* =====================
 KONTAINER
===================== */

      .container {
        width: 100%;

        max-width: 900px;

        z-index: 2;
      }

      /* =====================
 HEADER
===================== */

      header {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 25px;
      }

      h1 {
        font-size: 32px;

        background: linear-gradient(90deg, #38bdf8, #c084fc);

        -webkit-background-clip: text;

        color: transparent;
      }

      /* =====================
 KART
===================== */

      .card {
        background: rgba(255, 255, 255, 0.12);

        border: 1px solid rgba(255, 255, 255, 0.2);

        backdrop-filter: blur(20px);

        border-radius: 25px;

        padding: 30px;

        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);

        animation: show 0.5s ease;
      }

      @keyframes show {
        from {
          opacity: 0;

          transform: translateY(30px);
        }

        to {
          opacity: 1;

          transform: none;
        }
      }

      /* =====================
 MENU
===================== */

      #menu {
        text-align: center;
      }

      #menu h2 {
        font-size: 35px;

        margin-bottom: 15px;
      }

      #menu p {
        opacity: 0.8;

        font-size: 18px;

        margin-bottom: 20px;
      }

      /* =====================
 BUTONLAR
===================== */

      button,
      select {
        border: none;

        outline: none;

        padding: 13px 22px;

        border-radius: 15px;

        font-size: 16px;

        font-weight: 700;

        cursor: pointer;

        transition: 0.25s;

        background: linear-gradient(135deg, #38bdf8, #6366f1);

        color: white;

        box-shadow: 0 8px 20px #0005;
      }

      button:hover,
      select:hover {
        transform: translateY(-4px) scale(1.03);

        box-shadow: 0 15px 30px #0007;
      }

      button:active {
        transform: scale(0.95);
      }

      /* =====================
 İSTATİSTİKLER
===================== */

      .stats {
        display: flex;

        justify-content: space-between;

        align-items: center;

        background: rgba(0, 0, 0, 0.25);

        padding: 15px;

        border-radius: 18px;

        margin-bottom: 20px;

        font-size: 18px;
      }

      #combo {
        color: #facc15;

        animation: pulse 1s infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
        }

        to {
          transform: scale(1.1);
        }
      }

      #lives {
        letter-spacing: 3px;
      }

      /* =====================
 CÜMLE ALANI
===================== */

      #sentence {
        min-height: 90px;

        display: flex;

        flex-wrap: wrap;

        align-items: center;

        gap: 12px;

        padding: 20px;

        border-radius: 20px;

        background: rgba(255, 255, 255, 0.08);

        border: 2px dashed rgba(255, 255, 255, 0.2);
      }

      .word {
        background: linear-gradient(135deg, #22c55e, #16a34a);

        padding: 12px 18px;

        border-radius: 15px;

        animation: pop 0.3s;

        box-shadow: 0 8px 20px #0005;
      }

      @keyframes pop {
        from {
          transform: scale(0.5);

          opacity: 0;
        }

        to {
          transform: scale(1);

          opacity: 1;
        }
      }

      .word button {
        background: none;

        box-shadow: none;

        padding: 0;

        font-size: 12px;
      }

      /* =====================
 KELİME HAVUZU
===================== */

      #bank {
        display: flex;

        flex-wrap: wrap;

        gap: 12px;

        margin-top: 25px;
      }

      .chip {
        padding: 14px 22px;

        border-radius: 50px;

        background: linear-gradient(135deg, #60a5fa, #2563eb);

        cursor: pointer;

        font-weight: 700;

        box-shadow: 0 8px 20px #0006;

        transition: 0.25s;

        user-select: none;
      }

      .chip:hover {
        transform: translateY(-6px) rotate(-2deg);
      }

      .chip:active {
        transform: scale(0.9);
      }

      .hidden {
        opacity: 0;

        pointer-events: none;
      }

      /* =====================
 GERİ BİLDİRİM
===================== */

      .feedback {
        margin-top: 20px;

        padding: 15px;

        border-radius: 15px;

        font-size: 20px;
      }

      .good {
        background: #22c55e55;

        border: 1px solid #22c55e;
      }

      .bad {
        background: #ef444455;

        border: 1px solid #ef4444;
      }

      /* =====================
 BİTİŞ
===================== */

      #final {
        margin-top: 25px;

        font-size: 28px;

        line-height: 2;

        animation: show 0.5s;
      }

      /* =====================
 MOBİL
===================== */

      @media (max-width: 600px) {
        body {
          padding: 10px;
        }

        .card {
          padding: 20px;
        }

        h1 {
          font-size: 25px;
        }

        .stats {
          flex-direction: column;

          gap: 10px;
        }

        button {
          width: 100%;
        }

        .chip {
          padding: 12px 16px;
        }
      }
      .game-area {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="menu" class="card">
        <h2>🎮 Sözcük Zinciri</h2>

        <p>Zorluk seviyesini seç:</p>

        <br />

        <button onclick="chooseLevel(0)">🟢 Kolay</button>

        <button onclick="chooseLevel(1)">🟡 Orta</button>

        <button onclick="chooseLevel(2)">🔴 Zor</button>

        <button onclick="chooseLevel(3)">🟣 Çok Zor</button>
      </div>
      <header>
        <h1>🎮 Kelime Zinciri+</h1>

        <select id="level">
          <option value="0">Kolay</option>

          <option value="1">Orta</option>

          <option value="2">Zor</option>
        </select>
      </header>

      <div class="card game-area">
        <div class="stats">
          <div>
            Skor:
            <span id="score"> 0 </span>
          </div>

          <div id="combo">Combo:0</div>

          <div id="lives">❤️❤️❤️</div>

          <div>
            ⏱
            <span id="time"> 30 </span>
          </div>
        </div>

        <h3 id="info">Doğru cümleyi oluştur</h3>

        <div id="sentence"></div>

        <div id="bank"></div>

        <div id="feedback" class="feedback"></div>

        <div class="controls">
          <button id="submit">Gönder</button>

          <button id="clear">Temizle</button>

          <button id="restart">Yeniden Başlat</button>
        </div>

        <div id="final"></div>
      </div>
    </div>
    <script>
      const levels = [
        {
          name: "Kolay",
          sentences: [
            "Ali top oynar",
            "Kedi süt içer",
            "Kuş uçar",
            "Arı bal yapar",
            "Çocuk güler",
          ],
        },

        {
          name: "Orta",
          sentences: [
            "Ali parkta top oynar",
            "Küçük kedi süt içer",
            "Mavi kuş ağaçta uçar",
            "Çocuk okulda kitap okur",
          ],
        },

        {
          name: "Zor",
          sentences: [
            "Öğrenciler sessizce kitap okuyor",
            "Büyük köpek bahçede hızlı koşuyor",
            "Yeşil araba uzun yolda ilerliyor",
          ],
        },

        {
          name: "Çok Zor",
          sentences: [
            "Öğrenciler kütüphanede dikkatlice kitap okuyor",
            "Renkli kuşlar yüksek ağaçların üzerinde uçuyor",
            "Genç sporcular yarışmaya hazırlanıyor",
          ],
        },
      ];

      // STATE

      let state = {
        level: 0,
        index: 0,
        score: 0,
        combo: 0,
        lives: 3,
        time: 30,
      };

      let selected = [];

      let timer;

      // ELEMENTLER

      const menu = document.getElementById("menu");

      const game = document.querySelector(".game-area");

      const sentence = document.getElementById("sentence");

      const bank = document.getElementById("bank");

      const score = document.getElementById("score");

      const combo = document.getElementById("combo");

      const lives = document.getElementById("lives");

      const time = document.getElementById("time");

      const feedback = document.getElementById("feedback");

      const info = document.getElementById("info");

      const final = document.getElementById("final");

      // ZORLUK SEÇME

      function chooseLevel(lvl) {
        state.level = lvl;

        menu.style.display = "none";

        game.style.display = "block";

        startGame();
      }

      // BAŞLAT

      function startGame() {
        clearInterval(timer);

        state.index = 0;

        state.score = 0;

        state.combo = 0;

        state.lives = 3;

        final.innerHTML = "";

        final.style.display = "none";

        updateUI();

        loadSentence();
      }

      // CÜMLE YÜKLE

      function loadSentence() {
        clearInterval(timer);

        sentence.innerHTML = "";

        bank.innerHTML = "";

        feedback.innerHTML = "";

        selected = [];

        let text = levels[state.level].sentences[state.index];

        let words = text.split(" ");

        shuffle(words);

        words.forEach((word) => {
          let chip = document.createElement("div");

          chip.className = "chip";

          chip.textContent = word;

          chip.onclick = () => {
            addWord(word, chip);
          };

          bank.appendChild(chip);
        });

        state.time = 30;

        time.textContent = state.time;

        startTimer();
      }

      // KELİME EKLE

      function addWord(word, element) {
        if (selected.includes(word)) return;

        selected.push(word);

        element.classList.add("hidden");

        let box = document.createElement("div");

        box.className = "word";

        box.innerHTML =
          word +
          `
<button>❌</button>
`;

        box.querySelector("button").onclick = () => {
          selected = selected.filter((x) => x !== word);

          box.remove();

          element.classList.remove("hidden");
        };

        sentence.appendChild(box);
      }

      // KONTROL

      document.getElementById("submit").onclick = () => {
        let correct = levels[state.level].sentences[state.index];

        let answer = selected.join(" ");

        if (answer === correct) {
          feedback.textContent = "🎉 Doğru";

          feedback.className = "feedback good";

          state.combo++;

          state.score += 10 + state.combo * 2;

          next();
        } else {
          feedback.textContent = "❌ Yanlış";

          feedback.className = "feedback bad";

          state.combo = 0;

          state.lives--;

          if (state.lives <= 0) {
            endGame();
          }
        }

        updateUI();
      };

      // SONRAKİ

      function next() {
        state.index++;

        if (state.index >= levels[state.level].sentences.length) {
          state.index = 0;

          if (state.level < 3) state.level++;
          else {
            endGame();

            return;
          }
        }

        setTimeout(loadSentence, 700);
      }

      // TIMER

      function startTimer() {
        timer = setInterval(() => {
          state.time--;

          time.textContent = state.time;

          if (state.time <= 0) {
            clearInterval(timer);

            state.lives--;

            state.combo = 0;

            if (state.lives <= 0) endGame();
            else loadSentence();

            updateUI();
          }
        }, 1000);
      }

      // UI

      function updateUI() {
        score.textContent = state.score;

        combo.textContent = "Combo:" + state.combo;

        lives.textContent = "❤️".repeat(state.lives);
      }

      // OYUN BİTİŞ

      function endGame() {
        clearInterval(timer);

        saveScore(state.score);

        final.style.display = "block";

        final.innerHTML = `

<h2>🎮 Oyun Bitti</h2>


<p>
Skor:
<b>${state.score}</b>
</p>


<button onclick="startGame()">
Tekrar Oyna
</button>

`;
      }

      // MYSQL API

      async function saveScore(score) {
        try {
          await fetch("/api/game/score", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              userId: 1,

              score: score,
            }),
          });

          console.log("puan gönderildi");
        } catch (err) {
          console.log(err);
        }
      }

      // TEMİZLE

      document.getElementById("clear").onclick = () => {
        selected = [];

        sentence.innerHTML = "";

        [...bank.children].forEach((x) => {
          x.classList.remove("hidden");
        });
      };

      // YENİDEN

      document.getElementById("restart").onclick = startGame;

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }
    </script>
  </body>
</html>
